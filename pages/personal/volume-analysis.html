<div class="volume-page" style="font-family: 'DM Sans', system-ui, sans-serif; background: #F8F9FA; min-height: 100vh; color: #0A0A0A;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00C853;
      --green-dim: rgba(0,200,83,0.1);
      --green-border: rgba(0,200,83,0.25);
      --surface: #FFFFFF;
      --surface2: #F4F4F4;
      --border: #EBEBEB;
      --text-muted: #9CA3AF;
    }

    .vp-nav {
      background: #0A0A0A;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky; top: 0; z-index: 50;
    }
    .vp-nav-inner {
      max-width: 1400px; margin: 0 auto;
      padding: 0 32px; height: 64px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .vp-back {
      background: transparent; border: none;
      color: rgba(255,255,255,0.65); padding: 8px 10px; border-radius: 8px;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; transition: all 0.18s;
    }
    .vp-back:hover { background: rgba(255,255,255,0.07); color: #fff; }
    .vp-logout {
      background: transparent; border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.65); padding: 8px 12px; border-radius: 8px;
      cursor: pointer; font-size: 0.82rem; font-weight: 500; font-family: inherit;
      display: flex; align-items: center; gap: 6px; transition: all 0.18s;
    }
    .vp-logout:hover { color: #fff; background: rgba(255,255,255,0.07); }

    .vp-loading {
      min-height: calc(100vh - 64px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .vp-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(0,230,118,0.15);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .vp-hero { padding: 36px 28px 20px; max-width: 1100px; margin: 0 auto; }
    .vp-hero-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(0,230,118,0.7); margin-bottom: 8px; }
    .vp-hero-title { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1.2; }
    .vp-hero-sub { font-size: 0.875rem; color: var(--text-muted); margin-top: 6px; }

    .vp-stats-row { max-width: 1100px; margin: 24px auto 0; padding: 0 28px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .vp-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; }
    .vp-stat-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
    .vp-stat-value { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1; font-family: 'DM Mono', monospace; }
    .vp-stat-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }

    .vp-mode-row { max-width: 1100px; margin: 28px auto 0; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .vp-mode-label { font-size: 0.85rem; font-weight: 600; color: rgba(0,0,0,0.6); }
    .vp-toggle { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; gap: 3px; }
    .vp-toggle-btn { padding: 7px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.78rem; font-weight: 700; font-family: inherit; transition: all 0.2s; background: transparent; color: var(--text-muted); }
    .vp-toggle-btn.active { background: var(--green); color: #0A0A0A; }

    .vp-main { max-width: 1100px; margin: 28px auto 0; padding: 0 28px 60px; display: grid; grid-template-columns: 1fr 360px; gap: 20px; align-items: start; }

    .vp-bars-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 24px; overflow: hidden; }
    .vp-bars-title { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 22px; }
    .vp-bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; cursor: default; }
    .vp-bar-row:last-child { margin-bottom: 0; }
    .vp-bar-muscle { width: 110px; flex-shrink: 0; font-size: 0.8rem; font-weight: 600; color: rgba(0,0,0,0.75); text-align: right; }
    .vp-bar-track { flex: 1; height: 10px; background: rgba(0,0,0,0.06); border-radius: 99px; overflow: hidden; position: relative; }
    .vp-bar-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
    .vp-bar-val { width: 52px; flex-shrink: 0; font-size: 0.78rem; font-weight: 700; font-family: 'DM Mono', monospace; text-align: left; }

    .vp-manual-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
    .vp-manual-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .vp-manual-title { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
    .vp-manual-reset { font-size: 0.7rem; color: var(--text-muted); background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 3px 9px; cursor: pointer; font-family: inherit; font-weight: 600; transition: all 0.2s; }
    .vp-manual-reset:hover { color: #111; border-color: rgba(0,0,0,0.35); }
    .vp-manual-body { padding: 14px 20px; max-height: 540px; overflow-y: auto; }
    .vp-ex-item { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .vp-ex-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .vp-ex-name { font-size: 0.8rem; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
    .vp-ex-muscles { display: flex; flex-direction: column; gap: 5px; }
    .vp-muscle-row { display: flex; align-items: center; gap: 7px; }
    .vp-muscle-name { font-size: 0.72rem; color: var(--text-muted); width: 90px; flex-shrink: 0; }
    .vp-pct-input { width: 54px; padding: 4px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; font-size: 0.75rem; font-family: 'DM Mono', monospace; color: #111; outline: none; text-align: center; transition: border-color 0.2s; }
    .vp-pct-input:focus { border-color: var(--green); }
    .vp-pct-label { font-size: 0.68rem; color: var(--text-muted); }

    .vp-recalc { width: 100%; padding: 13px; margin: 0; background: var(--green); color: #0A0A0A; border: none; border-radius: 0 0 18px 18px; font-size: 0.875rem; font-weight: 800; cursor: pointer; font-family: inherit; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 7px; }
    .vp-recalc:hover { background: #00C853; }

    .vp-visual-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 24px; margin-top: 20px; }
    .vp-visual-title { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 20px; }

    .vp-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #FFFFFF; border: 1px solid var(--border); box-shadow: 0 4px 16px rgba(0,0,0,0.1); color: #111; padding: 10px 20px; border-radius: 10px; font-size: 0.8rem; font-weight: 600; z-index: 999; transition: transform 0.3s ease; white-space: nowrap; }
    .vp-toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 900px) { .vp-main { grid-template-columns: 1fr; } .vp-stats-row { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .vp-stats-row { grid-template-columns: 1fr 1fr; } .vp-hero-title { font-size: 1.4rem; } }
  </style>

  <!-- NAV -->
  <nav class="vp-nav">
    <div class="vp-nav-inner">
      <div style="display:flex;align-items:center;gap:14px;">
        <!-- Botão Voltar: sem onclick inline — o JS de volume-analysis.js adiciona o listener -->
        <button id="vpBackBtn" class="vp-back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div style="width:1px;height:24px;background:rgba(255,255,255,0.1);"></div>
        <img src="assets/branca_larga.png" style="height:26px;object-fit:contain;" onerror="this.style.display='none'">
      </div>
      <nav style="display:flex;align-items:center;gap:6px;">
        <button id="vpLogout" class="vp-logout">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sair
        </button>
      </nav>
    </div>
  </nav>

  <!-- CONTEÚDO DINÂMICO -->
  <div id="vpRoot">
    <div class="vp-loading">
      <div class="vp-spinner"></div>
      <p style="font-size:0.875rem;color:rgba(0,0,0,0.4);">Calculando volume semanal...</p>
    </div>
  </div>

  <div id="vpToast" class="vp-toast"></div>
</div>
