<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Featym — Personal Training Platform</title>
  <!--
    SECURITY: Content-Security-Policy definida via headers HTTP no vercel.json.
    style-src-attr 'none' — estilos inline em atributos style="" são bloqueados.
    Use classes CSS de css/components.css para substituir estilos inline.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/mobile-responsive-fixes.css">
</head>
<body>
  <div id="app">
    <div class="fc-loading-overlay" style="padding-top: 120px;">
      <div class="fc-spinner fc-spinner--lg"></div>
      <p class="fc-loading-overlay__text">Carregando...</p>
    </div>
  </div>

  <!-- Firebase SDK v9 (Compat mode) — hashes SRI verificados -->
  <script
    src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"
    integrity="sha384-ViccRjS0k/lvYsrtaKXk+ES61/4PAZlFI/mPHmLC1YWzK0AIbXbI5ZXDzcm3F8gH"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"
    integrity="sha384-+/4lqMnmLqwbdHXshvGDmBTeWlNoPRdjXi4ZsiBj10EhQXaTBe3RF5JZktdSjug6"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"
    integrity="sha384-7TetnPNdXXu6qURzIEXWCwpXedGGBJSXIR5Cv0gOWTB34UD5TxPHx33PhjA6wFQ3"
    crossorigin="anonymous"
  ></script>

  <!--
    Firebase App Check — deve ser carregado ANTES de config.js.

    SETUP NECESSÁRIO (Firebase Console):
    1. Firebase Console > App Check > Registrar app
    2. Escolher reCAPTCHA v3 como provedor
    3. Obter site key e substituir em js/config.js
    4. Após testes: App Check > Enforce para Firestore e Authentication

    DEBUG em dev: no console antes de carregar:
      self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;
  -->
  <script
    src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-check-compat.js"
    crossorigin="anonymous"
  ></script>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/db.js"></script>
  <script src="js/sanitize.js"></script>
  <script src="js/domain/feedbacks/feedbackModel.js"></script>
  <script src="js/subscriptionGuard.js"></script>
  <script src="js/router.js"></script>
</body>
</html>
